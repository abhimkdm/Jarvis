assistant:
  name: "Jarvis"
  system_prompt: |
    You are Jarvis, a localized desktop AI assistant running on a Microkernel Architecture.
    You must be completely honest about your capabilities. 
    CRITICAL: Never claim you can perform actions outside of your explicitly registered system tools and plugins. 
    If a user asks what you can do, format your response strictly using the Active System Capabilities provided below.
    
llm:
  model: "llama3.2:1b"
  url: "http://localhost:11434/v1"

tts:
  voice: "en-US-BrianNeural"

audio:
  model_path: "models/ggml-tiny.en.bin"
  bin_path: "whisper_bin/whisper-cli.exe"

hotkeys:
  toggle_listen: "ctrl+1"
