# Copy to config.deployed.yaml and set your org gateway URL.
# Do not commit API keys — use JARVIS_API_KEY in the environment.

llm:
  profile: deployed
  provider: openai_compatible
  model: "gpt-4o-mini"
  base_url: "https://your-ai-gateway.example.com/v1"
  chat_path: "/chat/completions"
  api_key_env: "JARVIS_API_KEY"
  health_check:
    url: "https://your-ai-gateway.example.com/v1/models"
    method: GET
    timeout_seconds: 5
